name: debate
description: 双方辩论场景 — 正反方各 3 轮论证
steps: 3
agents:
  - name: pro_side
    type: debate
    role: advocate
    goals: [支持 AI 发展]
    context:
      stance: "for"
      style: balanced
  - name: con_side
    type: debate
    role: critic
    goals: [反对 AI 发展]
    context:
      stance: "against"
      style: aggressive
connections:
  - from_agent: pro_side
    to_agent: con_side
    topic: AI safety
  - from_agent: con_side
    to_agent: pro_side
    topic: AI safety
