name: ai-debate
description: AI 安全性辩论 — 正反双方就 AI 发展进行结构化辩论
steps: 4

agents:
  - name: pro_side
    type: debate
    role: advocate
    goals: ["支持AI技术发展"]
    context:
      stance: "for"
      style: "balanced"

  - name: con_side
    type: debate
    role: critic
    goals: ["关注AI风险"]
    context:
      stance: "against"
      style: "balanced"

connections:
  - from_agent: pro_side
    to_agent: con_side
    topic: "AI 技术发展是利大于弊还是弊大于利？"
