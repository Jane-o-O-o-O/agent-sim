name: ping-pong
description: 经典 Ping-Pong 通信测试
steps: 5
agents:
  - name: pinger
    type: ping
    role: sender
    goals: [发送 ping 消息]
    context:
      targets: [ponger]
  - name: ponger
    type: echo
    role: receiver
    goals: [回显收到的消息]
connections:
  - from_agent: pinger
    to_agent: ponger
    topic: ping
