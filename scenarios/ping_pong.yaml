# 示例场景：Ping-Pong 多 Agent 通信
name: ping-pong
description: 演示 Coordinator 和 Worker 之间的 Ping-Pong 通信模式
steps: 5

agents:
  - name: coordinator
    type: ping
    role: coordinator
    goals: ["协调任务分配"]
    context:
      targets: ["worker_1", "worker_2"]

  - name: worker_1
    type: echo
    role: worker
    goals: ["执行分析任务"]

  - name: worker_2
    type: echo
    role: worker
    goals: ["执行计算任务"]
